name: pdf-tools

services:
  backend:
    image: pdf-tools-backend:latest
    build:
      context: ./backend
    container_name: pdf-tools-backend
    environment:
      AUTH_USERS_FILE: /output/pdf-tools/users.json
    command: python -m uvicorn app:app --host 0.0.0.0 --port 5000
    expose:
      - "5000"
    volumes:
      - ./output:/output
      - backend-temp:/app/temp
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: pdf-tools-frontend:latest
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:5000
        NEXT_PUBLIC_API_URL: /api/backend
    container_name: pdf-tools-frontend
    environment:
      BACKEND_INTERNAL_URL: http://backend:5000
      NEXT_PUBLIC_API_URL: /api/backend
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pdf-tools-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f cloudflared >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  backend-temp:
