name: pdf-tools

services:
  backend:
    build:
      context: ./backend
    container_name: pdf-tools-backend
    command: python -m uvicorn app:app --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./output:/output
      - backend-temp:/app/temp
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:5000
        NEXT_PUBLIC_API_URL: http://127.0.0.1:5000
    container_name: pdf-tools-frontend
    environment:
      BACKEND_INTERNAL_URL: http://backend:5000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:5000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-temp:
